<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#6c63ff"/>
          <path d="M8 16l6 6 10-12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>TaskFlow</span>
      </div>

      <nav class="nav">
        <button class="nav-item" routerLink="/home/tasks" routerLinkActive="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
          My Tasks
        </button>

        <button class="nav-item" routerLink="/home/search" routerLinkActive="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
        </button>

        <button class="nav-item" routerLink="/home/tasks" [queryParams]="{priority: 'today'}" routerLinkActive="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Today
        </button>

        <button class="nav-item" routerLink="/home/statistics" routerLinkActive="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Statistics
        </button>

        <button class="nav-item" routerLink="/home/tasks" [queryParams]="{priority: 'upcoming'}" routerLinkActive="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Upcoming
        </button>

        <!-- My Tasks -->
        <button class="nav-item collapsible" (click)="myTasksOpen = !myTasksOpen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          My Tasks
          <svg class="chevron" [class.open]="myTasksOpen" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="submenu" [class.open]="myTasksOpen">
          <a class="sub-item" routerLink="/home/tasks" [queryParams]="{status: 'not_done'}">Active</a>
          <a class="sub-item" routerLink="/home/tasks" [queryParams]="{status: 'done'}">Completed</a>
          <a class="sub-item" routerLink="/home/tasks" [queryParams]="{status: 'overdue'}">Overdue</a>
        </div>

        <!-- Workspaces -->
        <button class="nav-item collapsible" (click)="workspacesOpen = !workspacesOpen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          {{ workspaces.length ? 'Workspaces' : 'Create Workspace' }}
          <svg class="chevron" [class.open]="workspacesOpen" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="submenu" [class.open]="workspacesOpen">
          <div class="sub-item-row" *ngFor="let ws of workspaces">
            <a class="sub-item" [routerLink]="['/home/workspace', ws.id]">{{ ws.name }}</a>

            <ng-container *ngIf="pendingDeleteId !== ws.id">
              <button class="ws-delete-btn" (click)="deleteWorkspace($event, ws.id)" title="Delete workspace">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
              </button>
            </ng-container>

            <ng-container *ngIf="pendingDeleteId === ws.id">
              <button class="ws-confirm-btn" (click)="confirmDelete($event, ws.id)">✓</button>
              <button class="ws-cancel-btn" (click)="cancelDelete($event)">✕</button>
            </ng-container>
          </div>
          <button class="sub-item add-ws" (click)="showCreateWorkspace = true">+ New Workspace</button>
        </div>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="avatar">{{ auth.currentUser()?.charAt(0)?.toUpperCase() }}</div>
        <span>{{ auth.currentUser() }}</span>
      </div>
      <button class="logout-btn" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>

  <!-- Create Workspace Modal -->
  <div class="modal-overlay" *ngIf="showCreateWorkspace" (click)="showCreateWorkspace = false">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2>New Workspace</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" [(ngModel)]="newWorkspaceName" placeholder="Workspace name" />
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" [(ngModel)]="newWorkspaceDesc" placeholder="Optional description" />
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" (click)="showCreateWorkspace = false">Cancel</button>
        <button class="btn-primary" (click)="createWorkspace()">Create</button>
      </div>
    </div>
  </div>
</div>
